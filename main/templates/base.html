<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% load static %}

    <title>{% block title %}Earned Club{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">

    <style>
        :root {
            --bg: #0a0a0a;
            --card: #0f0f0f;
            --border: #1a1a1a;
            --text: #ffffff;
            --muted: rgba(255,255,255,0.55);
            --accent: #ffffff;
        }

        .brand-logo {
            height: 80px;          /* BIG base size */
            max-height: 10vh;      /* prevents overflow on small screens */
            width: auto;
            object-fit: contain;
            transition: all 0.2s ease;
        }

        /* hover effect */
        .brand-logo:hover {
            transform: scale(1.05);
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .brand-logo {
                height: 55px;
            }
        }

        /* VERY SMALL PHONES */
        @media (max-width: 400px) {
            .brand-logo {
                height: 45px;
            }
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* GLOBAL RESET */
        * {
            box-shadow: none !important;
        }

        /* NAVBAR */
        .navbar {
            background: var(--bg) !important;
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
        }

        .navbar-brand img {
            height: 52px;
            filter: brightness(1.05);
        }
.btn-main {
    display: inline-block;
    background: #ffffff;
    color: #000000;
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.2s ease;
    margin-top: 16px;
}

.btn-main:hover {
    opacity: 0.85;
    transform: translateY(-1px);
}

        /* NAV LINKS (UPDATED LOOK) */
        .nav-link {
            color: var(--muted) !important;
            font-weight: 500;
            margin-left: 16px;
            transition: 0.2s;
        }

        .nav-link:hover {
            color: var(--text) !important;
        }

        /* MAIN CONTAINER */
        .main-container {
            max-width: 950px;
            margin: auto;
            padding: 70px 20px;
        }

        /* CARD */
        .card-dark {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 22px;
        }

        /* BUTTON */
        .btn-main {
            background: var(--text);
            color: #000;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-main:hover {
            opacity: 0.85;
        }

        /* MUTED TEXT */
        .muted {
            color: var(--muted);
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .main-container {
                padding: 40px 16px;
            }

            .nav-link {
                margin-left: 0;
                padding: 10px 0;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{% static 'EarnedClub.png' %}" class="brand-logo" alt="Earned Club Logo">
        </a>

        <!-- TOGGLE -->
        <button class="navbar-toggler text-white border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            ☰
        </button>

        <!-- NAV -->
        <div class="collapse navbar-collapse justify-content-end" id="navMenu">
            <ul class="navbar-nav text-end">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/challenge">Challenge</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/leaderboard">Leaderboard</a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="main-container">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
