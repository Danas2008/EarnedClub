<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% load static %}

    <title>{% block title %}Earned Club{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">

    <style>
        body {
            background: #0a0a0a;
            color: white;
        }

        .navbar {
            background: #0a0a0a;
            border-bottom: 1px solid #1f1f1f;
        }

        .card {
            background: #121212;
            border: 1px solid #1f1f1f;
        }

        .btn-primary {
            background: white;
            color: black;
            border: none;
        }

        .btn-primary:hover {
            background: #ddd;
            color: black;
        }

        .muted {
            opacity: 0.6;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{% static 'EarnedClubLogo.png' %}" height="40" class="me-2">
            <strong>Earned Club</strong>
        </a>

        <!-- MOBILE MENU BUTTON -->
        <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            ☰
        </button>

        <!-- NAV LINKS -->
        <div class="collapse navbar-collapse justify-content-end" id="nav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link text-white" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/challenge">Challenge</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/leaderboard">Leaderboard</a></li>
            </ul>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="container py-5">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
