<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% load static %}

    <title>{% block title %}Earned Club{% endblock %}</title>

    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --border: #232323;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.65);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
        }

        a {
            text-decoration: none;
        }

        .navbar {
            background: var(--bg) !important;
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
        }

        .navbar .container {
            max-width: 1180px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        .brand-logo {
            height: 96px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .brand-logo:hover {
            transform: scale(1.03);
        }

        .navbar-toggler {
            color: #ffffff !important;
            font-size: 1rem;
            border: none !important;
            box-shadow: none !important;
            padding: 6px 10px;
        }

        .navbar-toggler:focus {
            box-shadow: none !important;
        }

        .nav-link {
            color: var(--muted) !important;
            font-weight: 500;
            margin-left: 18px;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: var(--text) !important;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 64px 20px 80px;
        }

        .card-dark {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 32px;
            margin-bottom: 22px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card-dark:hover {
            transform: translateY(-2px);
            border-color: #2f2f2f;
        }

        .content-wrap {
            max-width: 720px;
            margin: 0 auto;
        }

        h1, h2, h3 {
            color: var(--text);
            margin-top: 0;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.05;
            margin-bottom: 14px;
            text-align: center;
        }

        h2 {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }

        h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 14px;
            text-align: center;
        }

        p {
            color: var(--text);
            font-size: 1rem;
            line-height: 1.75;
            margin: 0 0 14px 0;
        }

        .muted {
            color: var(--muted);
        }

        .text-center {
            text-align: center;
        }

        .list-clean {
            max-width: 420px;
            margin: 18px auto 0 auto;
            padding-left: 20px;
            text-align: left;
        }

        .list-clean li {
            margin-bottom: 8px;
            color: var(--text);
        }

        .btn-main {
            display: inline-block;
            background: #ffffff;
            color: #000000;
            padding: 13px 24px;
            border-radius: 12px;
            font-weight: 700;
            transition: transform 0.2s ease, opacity 0.2s ease;
            margin-top: 12px;
        }

        .btn-main:hover {
            opacity: 0.88;
            transform: translateY(-1px);
            color: #000000;
        }

        .alert-stack {
            margin-bottom: 22px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            margin-top: 20px;
        }

        .video-card {
            display: block;
            background: #0d0d0d;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease;
            color: var(--text);
        }

        .video-card:hover {
            transform: translateY(-2px);
            border-color: #353535;
            color: var(--text);
        }

        .video-thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
            background: #000;
        }

        .video-body {
            padding: 18px;
            text-align: left;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .video-text {
            color: var(--muted);
            margin: 0;
        }

        @media (max-width: 768px) {
            .brand-logo {
                height: 74px;
            }

            .nav-link {
                margin-left: 0;
                padding: 10px 0;
                text-align: center;
            }

            .main-container {
                padding: 40px 16px 60px;
            }

            .card-dark {
                padding: 24px;
            }

            .content-wrap {
                max-width: 100%;
            }
        }

        @media (max-width: 400px) {
            .brand-logo {
                height: 60px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img
                    src="{% static 'EarnedClub.png' %}"
                    class="brand-logo"
                    alt="Earned Club Logo"
                >
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navMenu"
                aria-controls="navMenu"
                aria-expanded="false"
                aria-label="Toggle navigation"
            >
                Menu
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navMenu">
                <ul class="navbar-nav text-end">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/challenge/">Challenge</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/leaderboard/">Leaderboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-container">
        {% if messages %}
            <div class="alert-stack">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} mb-3" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
