<!-- SUBMISSION -->
<div class="card-dark">
    <h2>Submit Your Result</h2>

    <p class="muted">Enter your performance below</p>

    <form method="POST">
        {% csrf_token %}

        <div style="margin-bottom:15px;">
            <input type="text" name="name" placeholder="Your name" required
                   style="width:100%; padding:12px; border-radius:8px; border:none; background:#111; color:white;">
        </div>

        <div style="margin-bottom:15px;">
            <input type="number" name="reps" placeholder="Number of reps" required
                   style="width:100%; padding:12px; border-radius:8px; border:none; background:#111; color:white;">
        </div>

        <div style="margin-bottom:15px;">
            <input type="url" name="video_link" placeholder="Video link (YouTube / TikTok / Drive)" required
                   style="width:100%; padding:12px; border-radius:8px; border:none; background:#111; color:white;">
        </div>

        <button type="submit" class="btn-main" style="width:100%;">
            Submit Result
        </button>
    </form>
</div>
