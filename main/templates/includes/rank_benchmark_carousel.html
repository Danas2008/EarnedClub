<div class="benchmark-carousel" data-benchmark-carousel>
    <div class="benchmark-carousel-main">
        <button
            class="benchmark-arrow"
            type="button"
            data-benchmark-prev
            aria-label="Show previous benchmark"
        >
            &#8592;
        </button>
        <div class="benchmark-stage">
            {% for tier in rank_tiers %}
                <article
                    class="rank-card benchmark-slide{% if forloop.first %} is-active{% endif %}"
                    data-benchmark-slide
                    {% if not forloop.first %}hidden{% endif %}
                >
                    <div class="rank-name">{{ tier.name }}</div>
                    <h3>{{ tier.min_reps }}{% if tier.max_reps %}-{{ tier.max_reps }}{% else %}+{% endif %} reps</h3>
                    <p><strong>{{ tier.benchmark }}</strong></p>
                    <p class="muted" style="margin-bottom: 0;">{{ tier.description }}</p>
                </article>
            {% endfor %}
        </div>
        <button
            class="benchmark-arrow"
            type="button"
            data-benchmark-next
            aria-label="Show next benchmark"
        >
            &#8594;
        </button>
    </div>
    <div class="benchmark-rail" role="tablist" aria-label="Benchmark tiers">
        {% for tier in rank_tiers %}
            <button
                class="benchmark-chip{% if forloop.first %} is-active{% endif %}"
                type="button"
                data-benchmark-chip
                data-benchmark-index="{{ forloop.counter0 }}"
            >
                <span>{{ tier.name }}</span>
                <small>{{ tier.min_reps }}{% if tier.max_reps %}-{{ tier.max_reps }}{% else %}+{% endif %}</small>
            </button>
        {% endfor %}
    </div>
</div>
