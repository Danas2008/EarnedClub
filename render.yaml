services:
  - type: web
    name: earnedclub
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn core.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: earnedclub.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://earnedclub.onrender.com
      - key: DATABASE_URL
        sync: false
